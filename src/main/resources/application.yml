server:
  port: 8080
  servlet:
    context-path: /

spring:
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/gym_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.jdbc.Driver

  # Thymeleaf配置
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

  # 静态资源
  mvc:
    static-path-pattern: /static/**

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.stu.gym.gymmembermanage.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
  level:
    com.stu.gym.gymmembermanage: debug

# AI大模型配置（小米MiMo）
ai:
  api-key: ${AI_API_KEY1}
  api-url: https://api.xiaomimimo.com/v1/chat/completions
  model: mimo-v2.5-pro
  max-tokens: 1000
  temperature: 0.7
