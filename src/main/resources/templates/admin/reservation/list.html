<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约记录 - 健身房管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="common/header :: header"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-clipboard-list"></i> 预约记录</h2>
        </div>

        <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <div class="card mb-4">
            <div class="card-body">
                <form action="/admin/reservation/list" method="get" class="row g-3">
                    <div class="col-md-3">
                        <select class="form-select" name="memberId">
                            <option value="">选择会员</option>
                            <option th:each="m : ${members}" th:value="${m.id}" th:text="${m.realName}"
                                    th:selected="${memberId == m.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" name="courseId">
                            <option value="">选择课程</option>
                            <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.name}"
                                    th:selected="${courseId == c.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" name="status">
                            <option value="">全部状态</option>
                            <option value="1" th:selected="${status == 1}">已预约</option>
                            <option value="0" th:selected="${status == 0}">已取消</option>
                            <option value="2" th:selected="${status == 2}">已完成</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-outline-primary me-2">
                            <i class="fas fa-search"></i> 搜索
                        </button>
                        <a href="/admin/reservation/list" class="btn btn-outline-secondary">
                            <i class="fas fa-undo"></i> 重置
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>会员</th>
                                <th>课程</th>
                                <th>教练</th>
                                <th>上课时间</th>
                                <th>地点</th>
                                <th>状态</th>
                                <th>预约时间</th>
                                <th>取消时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${pageResult.list}">
                                <td th:text="${r.id}"></td>
                                <td>
                                    <strong th:text="${r.memberName}"></strong>
                                    <br>
                                    <small class="text-muted" th:text="${r.memberUsername}"></small>
                                </td>
                                <td th:text="${r.courseName}"></td>
                                <td th:text="${r.courseCoach}"></td>
                                <td th:text="${#dates.format(r.courseScheduleTime, 'yyyy-MM-dd HH:mm')}"></td>
                                <td th:text="${r.courseLocation}"></td>
                                <td>
                                    <span class="badge" th:classappend="'bg-' + ${r.statusClass}"
                                          th:text="${r.statusText}"></span>
                                </td>
                                <td th:text="${#dates.format(r.createTime, 'yyyy-MM-dd HH:mm')}"></td>
                                <td th:text="${r.cancelTime != null ? #dates.format(r.cancelTime, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                                <td>
                                    <a th:if="${r.status == 1}" th:href="@{/admin/reservation/cancel/{id}(id=${r.id})}"
                                       class="btn btn-sm btn-outline-warning" onclick="return confirm('确定要取消此预约吗？')">
                                        <i class="fas fa-times"></i> 取消
                                    </a>
                                    <a th:href="@{/admin/reservation/delete/{id}(id=${r.id})}" class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('确定要删除此记录吗？')">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="text-muted" th:if="${#lists.isEmpty(pageResult.list)}">
                    <i class="fas fa-info-circle"></i> 暂无数据
                </div>

                <!-- 分页 -->
                <div th:unless="${#lists.isEmpty(pageResult.list)}" class="mt-3">
                    <div th:replace="common/pagination :: pagination(${pageResult}, '/admin/reservation/list?memberId=' + (${memberId} ?: '') + '&courseId=' + (${courseId} ?: '') + '&status=' + (${status} ?: ''))"></div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="common/footer :: footer"></div>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
