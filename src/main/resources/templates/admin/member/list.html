<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员管理 - 健身房管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="common/header :: header"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-users"></i> 会员管理</h2>
            <a href="/admin/member/add" class="btn btn-primary">
                <i class="fas fa-plus"></i> 添加会员
            </a>
        </div>

        <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <div class="card mb-4">
            <div class="card-body">
                <form action="/admin/member/list" method="get" class="row g-3">
                    <div class="col-md-3">
                        <input type="text" class="form-control" name="realName" th:value="${realName}" placeholder="姓名">
                    </div>
                    <div class="col-md-3">
                        <input type="text" class="form-control" name="phone" th:value="${phone}" placeholder="手机号">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" name="status">
                            <option value="">全部状态</option>
                            <option value="1" th:selected="${status == 1}">正常</option>
                            <option value="0" th:selected="${status == 0}">禁用</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-outline-primary me-2">
                            <i class="fas fa-search"></i> 搜索
                        </button>
                        <a href="/admin/member/list" class="btn btn-outline-secondary">
                            <i class="fas fa-undo"></i> 重置
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>姓名</th>
                                <th>性别</th>
                                <th>手机号</th>
                                <th>邮箱</th>
                                <th>会员类型</th>
                                <th>状态</th>
                                <th>注册时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="member : ${pageResult.list}">
                                <td th:text="${member.id}"></td>
                                <td th:text="${member.username}"></td>
                                <td th:text="${member.realName}"></td>
                                <td th:text="${member.genderText}"></td>
                                <td th:text="${member.phone}"></td>
                                <td th:text="${member.email}"></td>
                                <td>
                                    <span class="badge" th:classappend="${member.memberType == 'VIP会员'} ? 'bg-warning' : 'bg-info'"
                                          th:text="${member.memberType}"></span>
                                </td>
                                <td>
                                    <span class="badge" th:classappend="${member.status == 1} ? 'bg-success' : 'bg-danger'"
                                          th:text="${member.statusText}"></span>
                                </td>
                                <td th:text="${#dates.format(member.createTime, 'yyyy-MM-dd HH:mm')}"></td>
                                <td>
                                    <a th:href="@{/admin/member/edit/{id}(id=${member.id})}" class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a th:if="${member.status == 1}" th:href="@{/admin/member/status/{id}/0(id=${member.id})}"
                                       class="btn btn-sm btn-outline-warning" onclick="return confirm('确定要禁用此会员吗？')">
                                        <i class="fas fa-ban"></i>
                                    </a>
                                    <a th:if="${member.status == 0}" th:href="@{/admin/member/status/{id}/1(id=${member.id})}"
                                       class="btn btn-sm btn-outline-success" onclick="return confirm('确定要启用此会员吗？')">
                                        <i class="fas fa-check"></i>
                                    </a>
                                    <a th:href="@{/admin/member/delete/{id}(id=${member.id})}" class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('确定要删除此会员吗？删除后不可恢复！')">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="text-muted" th:if="${#lists.isEmpty(pageResult.list)}">
                    <i class="fas fa-info-circle"></i> 暂无数据
                </div>

                <!-- 分页 -->
                <div th:unless="${#lists.isEmpty(pageResult.list)}" class="mt-3">
                    <div th:replace="common/pagination :: pagination(${pageResult}, '/admin/member/list?realName=' + (${realName} ?: '') + '&phone=' + (${phone} ?: '') + '&status=' + (${status} ?: ''))"></div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="common/footer :: footer"></div>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
