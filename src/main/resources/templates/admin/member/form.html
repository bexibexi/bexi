<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员信息 - 健身房管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="common/header :: header"></div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h4>
                            <i class="fas fa-user-plus"></i>
                            <span th:if="${member != null}">编辑会员</span>
                            <span th:unless="${member != null}">添加会员</span>
                        </h4>
                    </div>
                    <div class="card-body">
                        <!-- 会员添加模板 -->
                        <form action="/admin/member/save" method="post">
                            <input type="hidden" name="id" th:value="${member?.id}">

                            <div class="mb-3">
                                <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="username" name="username"
                                       th:value="${member?.username}" required
                                       th:readonly="${member != null}">
                                <small class="text-muted" th:if="${member != null}">用户名不可修改</small>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">
                                    密码 <span class="text-danger" th:if="${member == null}">*</span>
                                </label>
                                <input type="password" class="form-control" id="password" name="password"
                                       th:placeholder="${member != null ? '不修改请留空' : '请输入密码'}"
                                       th:required="${member == null}">
                            </div>

                            <div class="mb-3">
                                <label for="realName" class="form-label">真实姓名 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="realName" name="realName"
                                       th:value="${member?.realName}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">性别</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="gender" value="1"
                                           th:checked="${member?.gender == 1}">
                                    <label class="form-check-label">男</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="gender" value="2"
                                           th:checked="${member?.gender == 2}">
                                    <label class="form-check-label">女</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="gender" value="0"
                                           th:checked="${member == null or member?.gender == 0}">
                                    <label class="form-check-label">未知</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="phone" class="form-label">手机号</label>
                                <input type="tel" class="form-control" id="phone" name="phone"
                                       th:value="${member?.phone}">
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">邮箱</label>
                                <input type="email" class="form-control" id="email" name="email"
                                       th:value="${member?.email}">
                            </div>

                            <div class="mb-3">
                                <label for="memberType" class="form-label">会员类型</label>
                                <select class="form-select" id="memberType" name="memberType">
                                    <option value="普通会员" th:selected="${member?.memberType == '普通会员' or member == null}">普通会员</option>
                                    <option value="VIP会员" th:selected="${member?.memberType == 'VIP会员'}">VIP会员</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">状态</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="status" value="1"
                                           th:checked="${member?.status == 1 or member == null}">
                                    <label class="form-check-label">正常</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="status" value="0"
                                           th:checked="${member?.status == 0}">
                                    <label class="form-check-label">禁用</label>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="/admin/member/list" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left"></i> 返回列表
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> 保存
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div th:replace="common/footer :: footer"></div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
