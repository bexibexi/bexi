<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 健身房管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="common/header :: header"></div>

    <div class="container mt-4">
        <h2 class="mb-4"><i class="fas fa-tachometer-alt"></i> 控制台</h2>

        <!-- 统计卡片 -->
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title">会员总数</h6>
                                <h2 class="mb-0" th:text="${memberCount}">0</h2>
                            </div>
                            <i class="fas fa-users fa-3x opacity-50"></i>
                        </div>
                        <small>正常会员：<span th:text="${activeMemberCount}">0</span></small>
                    </div>
                    <div class="card-footer bg-primary border-top border-light">
                        <a href="/admin/member/list" class="text-white text-decoration-none">
                            查看详情 <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title">课程总数</h6>
                                <h2 class="mb-0" th:text="${courseCount}">0</h2>
                            </div>
                            <i class="fas fa-calendar-alt fa-3x opacity-50"></i>
                        </div>
                        <small>上架课程：<span th:text="${activeCourseCount}">0</span></small>
                    </div>
                    <div class="card-footer bg-success border-top border-light">
                        <a href="/admin/course/list" class="text-white text-decoration-none">
                            查看详情 <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card bg-warning text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title">预约总数</h6>
                                <h2 class="mb-0" th:text="${reservationCount}">0</h2>
                            </div>
                            <i class="fas fa-clipboard-list fa-3x opacity-50"></i>
                        </div>
                        <small>有效预约：<span th:text="${activeReservationCount}">0</span></small>
                    </div>
                    <div class="card-footer bg-warning border-top border-light">
                        <a href="/admin/reservation/list" class="text-white text-decoration-none">
                            查看详情 <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 快捷操作 -->
        <div class="row mt-4">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <i class="fas fa-plus-circle"></i> 快捷操作
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <a href="/admin/member/add" class="btn btn-outline-primary">
                                <i class="fas fa-user-plus"></i> 添加会员
                            </a>
                            <a href="/admin/course/add" class="btn btn-outline-success">
                                <i class="fas fa-plus"></i> 添加课程
                            </a>
                            <a href="/admin/reservation/list" class="btn btn-outline-warning">
                                <i class="fas fa-list"></i> 查看预约记录
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header bg-secondary text-white">
                        <i class="fas fa-info-circle"></i> 系统信息
                    </div>
                    <div class="card-body">
                        <ul class="list-unstyled">
                            <li class="mb-2"><i class="fas fa-check-circle text-success"></i> 系统运行正常</li>
                            <li class="mb-2"><i class="fas fa-database"></i> 数据库连接正常</li>
                            <li class="mb-2"><i class="fas fa-clock"></i> 当前时间：<span id="currentTime"></span></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div th:replace="common/footer :: footer"></div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateTime() {
            var now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleString('zh-CN');
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
