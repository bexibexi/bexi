<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程管理 - 健身房管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="common/header :: header"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-calendar-alt"></i> 课程管理</h2>
            <a href="/admin/course/add" class="btn btn-primary">
                <i class="fas fa-plus"></i> 添加课程
            </a>
        </div>

        <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <div class="card mb-4">
            <div class="card-body">
                <form action="/admin/course/list" method="get" class="row g-3">
                    <div class="col-md-3">
                        <input type="text" class="form-control" name="name" th:value="${name}" placeholder="课程名称">
                    </div>
                    <div class="col-md-3">
                        <input type="text" class="form-control" name="coach" th:value="${coach}" placeholder="教练姓名">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" name="status">
                            <option value="">全部状态</option>
                            <option value="1" th:selected="${status == 1}">上架</option>
                            <option value="0" th:selected="${status == 0}">下架</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-outline-primary me-2">
                            <i class="fas fa-search"></i> 搜索
                        </button>
                        <a href="/admin/course/list" class="btn btn-outline-secondary">
                            <i class="fas fa-undo"></i> 重置
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>课程名称</th>
                                <th>教练</th>
                                <th>上课时间</th>
                                <th>地点</th>
                                <th>时长</th>
                                <th>容量</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="course : ${pageResult.list}">
                                <td th:text="${course.id}"></td>
                                <td>
                                    <strong th:text="${course.name}"></strong>
                                    <br>
                                    <small class="text-muted" th:text="${#strings.abbreviate(course.description, 30)}"></small>
                                </td>
                                <td th:text="${course.coach}"></td>
                                <td th:text="${#dates.format(course.scheduleTime, 'yyyy-MM-dd HH:mm')}"></td>
                                <td th:text="${course.location}"></td>
                                <td th:text="${course.duration} + '分钟'"></td>
                                <td>
                                    <span th:text="${course.currentCount}"></span> / <span th:text="${course.maxCapacity}"></span>
                                    <div class="progress" style="height: 5px;">
                                        <div class="progress-bar" role="progressbar"
                                             th:style="'width: ' + ${course.maxCapacity > 0 ? course.currentCount * 100 / course.maxCapacity : 0} + '%'"
                                             th:classappend="${course.currentCount >= course.maxCapacity} ? 'bg-danger' : 'bg-success'">
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge" th:classappend="${course.status == 1} ? 'bg-success' : 'bg-secondary'"
                                          th:text="${course.statusText}"></span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/course/edit/{id}(id=${course.id})}" class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a th:if="${course.status == 1}" th:href="@{/admin/course/status/{id}/0(id=${course.id})}"
                                       class="btn btn-sm btn-outline-warning" onclick="return confirm('确定要下架此课程吗？')">
                                        <i class="fas fa-eye-slash"></i>
                                    </a>
                                    <a th:if="${course.status == 0}" th:href="@{/admin/course/status/{id}/1(id=${course.id})}"
                                       class="btn btn-sm btn-outline-success" onclick="return confirm('确定要上架此课程吗？')">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                    <a th:href="@{/admin/course/delete/{id}(id=${course.id})}" class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('确定要删除此课程吗？删除后不可恢复！')">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="text-muted" th:if="${#lists.isEmpty(pageResult.list)}">
                    <i class="fas fa-info-circle"></i> 暂无数据
                </div>

                <!-- 分页 -->
                <div th:unless="${#lists.isEmpty(pageResult.list)}" class="mt-3">
                    <div th:replace="common/pagination :: pagination(${pageResult}, '/admin/course/list?name=' + (${name} ?: '') + '&coach=' + (${coach} ?: '') + '&status=' + (${status} ?: ''))"></div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="common/footer :: footer"></div>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
