<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程信息 - 健身房管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="common/header :: header"></div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h4>
                            <i class="fas fa-calendar-plus"></i>
                            <span th:if="${course != null}">编辑课程</span>
                            <span th:unless="${course != null}">添加课程</span>
                        </h4>
                    </div>
                    <div class="card-body">
                        <form action="/admin/course/save" method="post">
                            <input type="hidden" name="id" th:value="${course?.id}">

                            <div class="mb-3">
                                <label for="name" class="form-label">课程名称 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="name" name="name"
                                       th:value="${course?.name}" required>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">课程描述</label>
                                <textarea class="form-control" id="description" name="description" rows="3"
                                          th:text="${course?.description}"></textarea>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="coach" class="form-label">教练姓名</label>
                                    <input type="text" class="form-control" id="coach" name="coach"
                                           th:value="${course?.coach}">
                                </div>
                                <div class="col-md-6">
                                    <label for="location" class="form-label">上课地点</label>
                                    <input type="text" class="form-control" id="location" name="location"
                                           th:value="${course?.location}">
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label for="scheduleTime" class="form-label">上课时间</label>
                                    <input type="datetime-local" class="form-control" id="scheduleTime" name="scheduleTime">
                                </div>
                                <div class="col-md-4">
                                    <label for="duration" class="form-label">课程时长(分钟)</label>
                                    <input type="number" class="form-control" id="duration" name="duration"
                                           th:value="${course?.duration}" value="60" min="1">
                                </div>
                                <div class="col-md-4">
                                    <label for="maxCapacity" class="form-label">最大容纳人数</label>
                                    <input type="number" class="form-control" id="maxCapacity" name="maxCapacity"
                                           th:value="${course?.maxCapacity}" value="20" min="1">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">状态</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="status" value="1"
                                           th:checked="${course?.status == 1 or course == null}">
                                    <label class="form-check-label">上架</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="status" value="0"
                                           th:checked="${course?.status == 0}">
                                    <label class="form-check-label">下架</label>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="/admin/course/list" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left"></i> 返回列表
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> 保存
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div th:replace="common/footer :: footer"></div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
