<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的预约 - 健身房管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="common/header :: header"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-clipboard-list"></i> 我的预约</h2>
            <a href="/member/course/list" class="btn btn-primary">
                <i class="fas fa-plus"></i> 预约新课程
            </a>
        </div>

        <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <div class="row">
            <div class="col-md-6 col-lg-4 mb-4" th:each="r : ${pageResult.list}">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center"
                         th:classappend="${r.status == 1} ? 'bg-success' : (${r.status == 0} ? 'bg-danger' : 'bg-info')">
                        <h5 class="mb-0 text-white" th:text="${r.courseName}">课程名称</h5>
                        <span class="badge bg-light text-dark" th:text="${r.statusText}">状态</span>
                    </div>
                    <div class="card-body">
                        <ul class="list-unstyled">
                            <li class="mb-2">
                                <i class="fas fa-user-tie"></i>
                                教练：<span th:text="${r.courseCoach}">教练</span>
                            </li>
                            <li class="mb-2">
                                <i class="fas fa-clock"></i>
                                上课时间：<span th:text="${#dates.format(r.courseScheduleTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                            </li>
                            <li class="mb-2">
                                <i class="fas fa-map-marker-alt"></i>
                                地点：<span th:text="${r.courseLocation}">地点</span>
                            </li>
                            <li class="mb-2">
                                <i class="fas fa-calendar-plus"></i>
                                预约时间：<span th:text="${#dates.format(r.createTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                            </li>
                            <li class="mb-2" th:if="${r.cancelTime != null}">
                                <i class="fas fa-calendar-times"></i>
                                取消时间：<span th:text="${#dates.format(r.cancelTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                            </li>
                        </ul>
                    </div>
                    <div class="card-footer" th:if="${r.status == 1}">
                        <a th:href="@{/member/reservation/cancel/{id}(id=${r.id})}"
                           class="btn btn-outline-danger w-100"
                           onclick="return confirm('确定要取消此预约吗？')">
                            <i class="fas fa-times"></i> 取消预约
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center py-5" th:if="${#lists.isEmpty(pageResult.list)}">
            <i class="fas fa-calendar-plus fa-4x text-muted mb-3"></i>
            <h4 class="text-muted">暂无预约记录</h4>
            <p class="text-muted">快去预约感兴趣的课程吧！</p>
            <a href="/member/course/list" class="btn btn-primary">
                <i class="fas fa-search"></i> 浏览课程
            </a>
        </div>

        <!-- 分页 -->
        <div th:unless="${#lists.isEmpty(pageResult.list)}" class="mt-3">
            <div th:replace="common/pagination :: pagination(${pageResult}, '/member/reservation/list?')"></div>
        </div>
    </div>

    <div th:replace="common/footer :: footer"></div>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
