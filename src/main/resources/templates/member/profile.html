<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 健身房管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 30px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="common/header :: header"></div>

    <div class="container mt-4">
        <!-- 个人信息头部 -->
        <div class="profile-header mb-4">
            <div class="d-flex align-items-center">
                <div class="avatar me-4">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <h2 th:text="${member.realName}">会员姓名</h2>
                    <p class="mb-0">
                        <span class="badge bg-light text-dark" th:text="${member.memberType}">普通会员</span>
                        <span class="badge" th:classappend="${member.status == 1} ? 'bg-success' : 'bg-danger'"
                              th:text="${member.statusText}">正常</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- 提示消息 -->
        <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <div class="row">
            <!-- 个人信息展示 -->
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <i class="fas fa-id-card"></i> 基本信息
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between">
                                <span class="text-muted">用户名</span>
                                <strong th:text="${member.username}"></strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span class="text-muted">姓名</span>
                                <strong th:text="${member.realName}"></strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span class="text-muted">性别</span>
                                <strong th:text="${member.genderText}"></strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span class="text-muted">手机号</span>
                                <strong th:text="${member.phone ?: '未填写'}"></strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span class="text-muted">邮箱</span>
                                <strong th:text="${member.email ?: '未填写'}"></strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span class="text-muted">注册时间</span>
                                <strong th:text="${#dates.format(member.createTime, 'yyyy-MM-dd')}"></strong>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 修改信息表单 -->
            <div class="col-md-8 mb-4">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <i class="fas fa-user-edit"></i> 修改个人信息
                    </div>
                    <div class="card-body">
                        <form action="/member/profile/update" method="post">
                            <div class="mb-3">
                                <label for="realName" class="form-label">真实姓名</label>
                                <input type="text" class="form-control" id="realName" name="realName"
                                       th:value="${member.realName}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">性别</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="1"
                                           th:checked="${member.gender == 1}">
                                    <label class="form-check-label">男</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="2"
                                           th:checked="${member.gender == 2}">
                                    <label class="form-check-label">女</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="0"
                                           th:checked="${member.gender == 0 or member.gender == null}">
                                    <label class="form-check-label">未知</label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">手机号</label>
                                <input type="tel" class="form-control" id="phone" name="phone"
                                       th:value="${member.phone}">
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">邮箱</label>
                                <input type="email" class="form-control" id="email" name="email"
                                       th:value="${member.email}">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">修改密码</label>
                                <input type="password" class="form-control" id="password" name="password"
                                       placeholder="不修改请留空">
                                <small class="text-muted">留空表示不修改密码</small>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> 保存修改
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div th:replace="common/footer :: footer"></div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
