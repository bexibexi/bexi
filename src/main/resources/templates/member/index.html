<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员中心 - 健身房管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .welcome-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 40px;
        }
        .stat-card {
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="common/header :: header"></div>

    <div class="container mt-4">
        <!-- 欢迎区域 -->
        <div class="welcome-section mb-4">
            <h2><i class="fas fa-hand-sparkles"></i> 欢迎回来，<span th:text="${member.realName}">会员</span>！</h2>
            <p class="mb-0">享受健身，享受生活</p>
        </div>

        <!-- 统计卡片 -->
        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="card stat-card bg-primary text-white">
                    <div class="card-body text-center">
                        <i class="fas fa-calendar-check fa-3x mb-3"></i>
                        <h5>我的预约</h5>
                        <h2 th:text="${reservationCount}">0</h2>
                        <small>有效预约数</small>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card stat-card bg-success text-white">
                    <div class="card-body text-center">
                        <i class="fas fa-running fa-3x mb-3"></i>
                        <h5>可选课程</h5>
                        <h2 th:text="${courseCount}">0</h2>
                        <small>上架课程数</small>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card stat-card bg-warning text-white">
                    <div class="card-body text-center">
                        <i class="fas fa-user fa-3x mb-3"></i>
                        <h5>会员类型</h5>
                        <h4 th:text="${member.memberType}">普通会员</h4>
                        <small>当前等级</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- 快捷操作 -->
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-header bg-info text-white">
                        <i class="fas fa-bolt"></i> 快捷操作
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-3">
                            <a href="/member/course/list" class="btn btn-outline-primary btn-lg">
                                <i class="fas fa-calendar-plus"></i> 预约课程
                            </a>
                            <a href="/member/reservation/list" class="btn btn-outline-success btn-lg">
                                <i class="fas fa-list"></i> 我的预约
                            </a>
                            <a href="/member/profile" class="btn btn-outline-warning btn-lg">
                                <i class="fas fa-user-edit"></i> 个人中心
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-header bg-secondary text-white">
                        <i class="fas fa-info-circle"></i> 个人信息
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between">
                                <span>用户名</span>
                                <strong th:text="${member.username}"></strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>姓名</span>
                                <strong th:text="${member.realName}"></strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>手机号</span>
                                <strong th:text="${member.phone ?: '未填写'}"></strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>邮箱</span>
                                <strong th:text="${member.email ?: '未填写'}"></strong>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div th:replace="common/footer :: footer"></div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
