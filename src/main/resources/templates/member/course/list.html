<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程预约 - 健身房管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .course-card {
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div th:replace="common/header :: header"></div>

    <div class="container mt-4">
        <h2 class="mb-4"><i class="fas fa-calendar-alt"></i> 课程预约</h2>

        <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <div class="row">
            <div class="col-md-6 col-lg-4 mb-4" th:each="course : ${pageResult.list}">
                <div class="card course-card h-100">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0" th:text="${course.name}">课程名称</h5>
                    </div>
                    <div class="card-body">
                        <p class="card-text" th:text="${course.description}">课程描述</p>
                        <ul class="list-unstyled">
                            <li class="mb-2">
                                <i class="fas fa-user-tie text-primary"></i>
                                教练：<strong th:text="${course.coach}">教练</strong>
                            </li>
                            <li class="mb-2">
                                <i class="fas fa-clock text-success"></i>
                                时间：<span th:text="${#dates.format(course.scheduleTime, 'MM-dd HH:mm')}">时间</span>
                            </li>
                            <li class="mb-2">
                                <i class="fas fa-map-marker-alt text-danger"></i>
                                地点：<span th:text="${course.location}">地点</span>
                            </li>
                            <li class="mb-2">
                                <i class="fas fa-hourglass-half text-warning"></i>
                                时长：<span th:text="${course.duration}">60</span> 分钟
                            </li>
                        </ul>
                        <div class="mb-3">
                            <div class="d-flex justify-content-between mb-1">
                                <small>预约人数</small>
                                <small>
                                    <span th:text="${course.currentCount}">0</span> / <span th:text="${course.maxCapacity}">20</span>
                                </small>
                            </div>
                            <div class="progress" style="height: 8px;">
                                <div class="progress-bar" role="progressbar"
                                     th:style="'width: ' + ${course.maxCapacity > 0 ? course.currentCount * 100 / course.maxCapacity : 0} + '%'"
                                     th:classappend="${course.isFull()} ? 'bg-danger' : 'bg-success'">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div th:if="${course.isFull()}">
                            <button class="btn btn-secondary w-100" disabled>
                                <i class="fas fa-ban"></i> 名额已满
                            </button>
                        </div>
                        <div th:unless="${course.isFull()}">
                            <a th:href="@{/member/reservation/make/{id}(id=${course.id})}"
                               class="btn btn-primary w-100"
                               onclick="return confirm('确定要预约此课程吗？')">
                                <i class="fas fa-check"></i> 立即预约
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center py-5" th:if="${#lists.isEmpty(pageResult.list)}">
            <i class="fas fa-calendar-times fa-4x text-muted mb-3"></i>
            <h4 class="text-muted">暂无可预约的课程</h4>
            <p class="text-muted">请稍后再来查看</p>
        </div>

        <!-- 分页 -->
        <div th:unless="${#lists.isEmpty(pageResult.list)}" class="mt-3">
            <div th:replace="common/pagination :: pagination(${pageResult}, '/member/course/list?')"></div>
        </div>
    </div>

    <div th:replace="common/footer :: footer"></div>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
