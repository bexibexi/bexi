<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身房管理系统 - 首页</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 100px 0;
        }
        .feature-card {
            transition: transform 0.3s;
        }
        .feature-card:hover {
            transform: translateY(-10px);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-dumbbell"></i> 健身房管理系统
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/login">登录</a>
                <a class="nav-link" href="/register">注册</a>
            </div>
        </div>
    </nav>

    <!-- 主视觉区域 -->
    <section class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 mb-4">欢迎来到健身房管理系统</h1>
            <p class="lead mb-5">专业的会员管理与课程预约平台，让健身更简单</p>
            <div>
                <a href="/register" class="btn btn-light btn-lg me-3">立即注册</a>
                <a href="/login" class="btn btn-outline-light btn-lg">会员登录</a>
            </div>
        </div>
    </section>

    <!-- 功能介绍 -->
    <section class="py-5">
        <div class="container">
            <h2 class="text-center mb-5">系统功能</h2>
            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card feature-card h-100 text-center p-4">
                        <div class="card-body">
                            <i class="fas fa-users fa-3x text-primary mb-3"></i>
                            <h5 class="card-title">会员管理</h5>
                            <p class="card-text">完善的会员信息管理，支持注册、登录、个人信息维护等功能</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card feature-card h-100 text-center p-4">
                        <div class="card-body">
                            <i class="fas fa-calendar-check fa-3x text-success mb-3"></i>
                            <h5 class="card-title">课程预约</h5>
                            <p class="card-text">丰富的健身课程，支持在线预约、取消预约，实时查看课程名额</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card feature-card h-100 text-center p-4">
                        <div class="card-body">
                            <i class="fas fa-chart-line fa-3x text-warning mb-3"></i>
                            <h5 class="card-title">数据分析</h5>
                            <p class="card-text">管理员可查看会员数据、课程预约情况，助力健身房运营决策</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer th:replace="common/footer :: footer"></footer>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
