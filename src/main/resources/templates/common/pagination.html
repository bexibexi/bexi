<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- 分页组件片段 -->
<nav th:fragment="pagination(pageResult, baseUrl)" aria-label="Page navigation">
    <div class="d-flex justify-content-between align-items-center">
        <div class="text-muted">
            共 <span th:text="${pageResult.totalCount}">0</span> 条记录，
            第 <span th:text="${pageResult.pageNum}">1</span>/<span th:text="${pageResult.totalPages}">1</span> 页
        </div>
        <ul class="pagination mb-0">
            <!-- 首页 -->
            <li class="page-item" th:classappend="${!pageResult.hasPrevious} ? 'disabled'">
                <a class="page-link" th:href="${baseUrl + '&pageNum=1'}">
                    <i class="fas fa-angle-double-left"></i>
                </a>
            </li>
            <!-- 上一页 -->
            <li class="page-item" th:classappend="${!pageResult.hasPrevious} ? 'disabled'">
                <a class="page-link" th:href="${baseUrl + '&pageNum=' + (pageResult.pageNum - 1)}">
                    <i class="fas fa-angle-left"></i>
                </a>
            </li>
            <!-- 页码 -->
            <li class="page-item" th:each="i : ${#numbers.sequence(1, pageResult.totalPages)}"
                th:classappend="${i == pageResult.pageNum} ? 'active'"
                th:if="${i >= pageResult.pageNum - 2 and i <= pageResult.pageNum + 2}">
                <a class="page-link" th:href="${baseUrl + '&pageNum=' + i}" th:text="${i}">1</a>
            </li>
            <!-- 下一页 -->
            <li class="page-item" th:classappend="${!pageResult.hasNext} ? 'disabled'">
                <a class="page-link" th:href="${baseUrl + '&pageNum=' + (pageResult.pageNum + 1)}">
                    <i class="fas fa-angle-right"></i>
                </a>
            </li>
            <!-- 末页 -->
            <li class="page-item" th:classappend="${!pageResult.hasNext} ? 'disabled'">
                <a class="page-link" th:href="${baseUrl + '&pageNum=' + pageResult.totalPages}">
                    <i class="fas fa-angle-double-right"></i>
                </a>
            </li>
        </ul>
    </div>
</nav>
</html>
