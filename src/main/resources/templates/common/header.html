<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- 公共头部片段 -->
<div th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-dumbbell"></i> 健身房管理系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <!-- 管理员导航 -->
                <ul class="navbar-nav me-auto" th:if="${session.loginRole == 'admin'}">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/dashboard">控制台</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/member/list">会员管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/course/list">课程管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/reservation/list">预约记录</a>
                    </li>
                </ul>
                <!-- 会员导航 -->
                <ul class="navbar-nav me-auto" th:if="${session.loginRole == 'member'}">
                    <li class="nav-item">
                        <a class="nav-link" href="/member/index">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/member/course/list">课程预约</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/member/reservation/list">我的预约</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/member/ai/recommend">
                            <i class="fas fa-magic"></i> 智能推荐
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/member/ai/chat">
                            <i class="fas fa-robot"></i> 智能客服
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/member/profile">个人中心</a>
                    </li>
                </ul>
                <!-- 用户信息 -->
                <ul class="navbar-nav">
                    <li class="nav-item" th:if="${session.adminUser != null}">
                        <span class="nav-link">
                            <i class="fas fa-user-shield"></i>
                            <span th:text="${session.adminUser.realName}">管理员</span>
                        </span>
                    </li>
                    <li class="nav-item" th:if="${session.memberUser != null}">
                        <span class="nav-link">
                            <i class="fas fa-user"></i>
                            <span th:text="${session.memberUser.realName}">会员</span>
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">
                            <i class="fas fa-sign-out-alt"></i> 退出
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>
</html>
